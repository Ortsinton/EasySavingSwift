name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Both jobs need the pinned toolchain: xcodebuild for tests, and the
# SPM command plugins (SwiftFormat/SwiftLint) compile against the
# selected Xcode too.
env:
  DEVELOPER_DIR: /Applications/Xcode_26.6.app/Contents/Developer

jobs:
  lint:
    name: lint
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true # installs the Gemfile.lock bundle, cached; reads .ruby-version

      # Cache keys are job-scoped: both jobs write to EasySavingKit/.build
      # but with different contents (plugin binaries here, Kit build +
      # snapshot-testing graph in build-test). Actions cache entries are
      # immutable — a shared key would leave one job restoring the other
      # job's partial cache forever.
      - name: Restore SPM plugin binaries
        uses: actions/cache@v4
        with:
          path: EasySavingKit/.build
          key: spm-lint-xcode26.6-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-lint-xcode26.6-

      - run: bundle exec fastlane lint

  test:
    name: test
    needs: lint
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Restore SPM build
        uses: actions/cache@v4
        with:
          path: EasySavingKit/.build
          key: spm-test-xcode26.6-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-test-xcode26.6-

      - run: bundle exec fastlane test

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: fastlane/test_output
