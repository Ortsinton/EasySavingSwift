# EasySaving SwiftLint configuration (task 0-3).
#
# Opinionated choices, most important first:
# 1. custom_rules enforce the ADR-002 module boundary that the compiler
#    cannot: SDK frameworks (SwiftUI/SwiftData/UIKit) are ambient and
#    importable from anywhere, so the ban must live in tooling (TASK_LOG 0-2).
# 2. Formatting rules overlapping with SwiftFormat are disabled — one owner
#    per concern, so the two tools never fight over the same line.
# 3. Single config file: CI promotes warnings to errors with `--strict` in
#    the Fastlane lane instead of maintaining a duplicated CI profile.
# 4. force_unwrapping is opted in as an error-by-CI: a crash-by-design
#    operator has no place in a finance app.

excluded:
  - .build
  - EasySavingKit/.build
  - fastlane
  # Test code is linted in a separate pass against EasySavingKit/Tests/.swiftlint.yml
  # (see the lint lane). Excluded here because the SwiftLint plugin always appends
  # the package's own paths to the forwarded ones (task 0-3 finding), so the
  # production pass would otherwise drag the tests in. Both spellings on purpose:
  # the plugin resolves paths from the package dir, this file lives at repo root.
  - EasySavingKit/Tests
  - Tests

disabled_rules:
  - trailing_whitespace  # owned by SwiftFormat
  - trailing_comma       # owned by SwiftFormat
  - vertical_whitespace  # owned by SwiftFormat
  - opening_brace        # owned by SwiftFormat

opt_in_rules:
  - force_unwrapping
  - empty_count

line_length:
  warning: 120
  ignores_comments: true

type_name:
  excluded:
    - ID # nested typed identifiers (ADR-010); the stdlib's Identifiable consecrates the name

custom_rules:
  core_boundary:
    name: "Core boundary (ADR-002)"
    regex: '^\s*import (SwiftUI|SwiftData|UIKit)\b'
    included: ".*/EasySavingCore/.*\\.swift"
    message: "EasySavingCore must not import UI or persistence frameworks (ADR-002)."
    severity: error
  data_boundary:
    name: "Data boundary (ADR-002)"
    regex: '^\s*import (SwiftUI|UIKit)\b'
    included: ".*/EasySavingData/.*\\.swift"
    message: "EasySavingData must not import UI frameworks (ADR-002)."
    severity: error
